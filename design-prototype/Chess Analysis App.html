// ─── EVAL BAR ─────────────────────────────────────────────────────────────────
const EvalBar = ({ eval: ev = 0, height = 480 }) => {
  const clamp = Math.max(-5, Math.min(5, ev));
  const whitePct = 50 + (clamp / 5) * 45;
  const label = ev > 0 ? `+${ev.toFixed(1)}` : ev.toFixed(1);

  return (
    <div style={{ width: 24, height, display:'flex', flexDirection:'column', borderRadius: 4, overflow:'hidden', border:`1px solid ${T.border}`, position:'relative', flexShrink:0 }}>
      {/* Black portion */}
      <div style={{ flex: 1, background: '#1a1a1a', transition:'flex 0.5s ease' }} />
      {/* White portion */}
      <div style={{ height:`${whitePct}%`, background:'#e8dcc8', transition:'height 0.5s ease', flexShrink:0 }} />
      {/* Label */}
      <div style={{
        position:'absolute', left:'50%', top: ev >= 0 ? undefined : '50%',
        bottom: ev >= 0 ? '50%' : undefined,
        transform:'translateX(-50%)',
        fontSize: 9, fontFamily:"'DM Mono',monospace", fontWeight:500,
        color: ev > 0 ? '#1a1a1a' : '#e8dcc8',
        padding:'2px 1px', letterSpacing:'-0.5px',
        writingMode:'vertical-rl', textOrientation:'mixed',
      }}>{label}</div>
    </div>
  );
};

// ─── MOVE CLASSIFICATION BADGE ───────────────────────────────────────────────
const MoveClass = {
  brilliant: { symbol: '!!', color: '#00bcd4', bg: 'rgba(0,188,212,0.15)', label: 'Бріліант' },
  best:      { symbol: '!',  color: '#4caf50', bg: 'rgba(76,175,80,0.15)',  label: 'Найкращий' },
  good:      { symbol: '⊕',  color: '#8bc34a', bg: 'rgba(139,195,74,0.12)', label: 'Добре' },
  book:      { symbol: '⊙',  color: '#7a9e76', bg: 'rgba(120,160,120,0.1)', label: 'Теорія' },
  miss:      { symbol: '?!', color: '#ff9800', bg: 'rgba(255,152,0,0.15)',  label: 'Хиба' },
  mistake:   { symbol: '?',  color: '#d4a017', bg: 'rgba(212,160,23,0.15)', label: 'Зівок' },
  blunder:   { symbol: '??', color: '#c0392b', bg: 'rgba(192,57,43,0.15)', label: 'Груба' },
};

const ClassBadge = ({ cls }) => {
  if (!cls || !MoveClass[cls]) return null;
  const { symbol, color, bg, label } = MoveClass[cls];
  return (
    <span title={label} style={{
      display:'inline-flex', alignItems:'center', justifyContent:'center',
      width:18, height:18, borderRadius:'50%',
      background: bg, color, fontSize: cls === 'brilliant' ? 9 : 10, fontWeight:700,
      flexShrink:0, border:`1px solid ${color}55`,
      cursor:'default',
    }}>{symbol}</span>
  );
};

// ─── EVAL CHART ──────────────────────────────────────────────────────────────
const EvalChart = ({ moves, currentIdx, onSeek }) => {
  const width = 320, height = 80;
  const evals = moves.map(m => Math.max(-5, Math.min(5, m.eval || 0)));
  const n = evals.length;
  if (n < 2) return null;

  const pts = evals.map((e, i) => {
    const x = (i / (n - 1)) * width;
    const y = height / 2 - (e / 5) * (height / 2 - 6);
    return `${x},${y}`;
  });

  const fillAbove = `M${pts[0]} ` + pts.slice(1).map(p=>`L${p}`).join(' ') + ` L${width},${height/2} L0,${height/2} Z`;
  const fillBelow = `M${pts[0]} ` + pts.slice(1).map(p=>`L${p}`).join(' ') + ` L${width},${height/2} L0,${height/2} Z`;

  const curX = currentIdx >= 0 ? (currentIdx / (n-1)) * width : -1;

  return (
    <div style={{ position:'relative', cursor:'pointer' }} onClick={e => {
      const rect = e.currentTarget.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const idx = Math.round((x / width) * (n - 1));
      onSeek(Math.max(0, Math.min(n-1, idx)));
    }}>
      <svg width={width} height={height} style={{ display:'block', borderRadius:4, overflow:'hidden' }}>
        <defs>
          <clipPath id="above"><rect x="0" y="0" width={width} height={height/2}/></clipPath>
          <clipPath id="below"><rect x="0" y={height/2} width={width} height={height/2}/></clipPath>
        </defs>
        <rect width={width} height={height} fill={T.bg3}/>
        <line x1={0} y1={height/2} x2={width} y2={height/2} stroke={T.border} strokeWidth={1}/>
        {/* White advantage */}
        <path d={fillAbove} fill="rgba(232,220,200,0.85)" clipPath="url(#above)"/>
        {/* Black advantage */}
        <path d={fillBelow} fill="rgba(30,30,30,0.9)" clipPath="url(#below)"/>
        {/* Line */}
        <polyline points={pts.join(' ')} fill="none" stroke={T.greenLt} strokeWidth={1.5}/>
        {/* Current position indicator */}
        {curX >= 0 && <line x1={curX} y1={0} x2={curX} y2={height} stroke={T.greenMid} strokeWidth={1.5} strokeDasharray="3,2"/>}
        {curX >= 0 && <circle cx={curX} cy={height/2 - (evals[currentIdx]/5)*(height/2-6)} r={4} fill={T.green} stroke={T.greenPl} strokeWidth={1.5}/>}
      </svg>
    </div>
  );
};

// ─── MOVES LIST ──────────────────────────────────────────────────────────────
const MovesList = ({ moves, currentIdx, onSelect }) => {
  const pairs = [];
  for (let i = 0; i < moves.length; i += 2) {
    pairs.push({ num: Math.floor(i/2)+1, w: moves[i], b: moves[i+1], wi: i, bi: i+1 });
  }

  return (
    <div style={{ overflowY:'auto', flex:1, padding:'8px 4px', display:'flex', flexDirection:'column', gap:2 }}>
      {pairs.map(({ num, w, b, wi, bi }) => (
        <div key={num} style={{ display:'flex', alignItems:'center', gap:2, borderRadius:4, overflow:'hidden' }}>
          <span style={{ width:28, textAlign:'right', fontSize:11, color:T.faded, fontFamily:"'DM Mono',monospace", flexShrink:0, paddingRight:4 }}>{num}.</span>
          {/* White move */}
          <div onClick={() => onSelect(wi)} style={{
            flex:1, padding:'4px 8px', borderRadius:3, cursor:'pointer',
            background: currentIdx === wi ? T.green : 'transparent',
            color: currentIdx === wi ? '#fff' : T.cream,
            fontSize:13, fontFamily:"'DM Mono',monospace",
            display:'flex', alignItems:'center', gap:4,
            transition:'background 0.15s',
          }}>
            <span>{w.san}</span>
            {w.class && <ClassBadge cls={w.class}/>}
          </div>
          {/* Black move */}
          {b && (
            <div onClick={() => onSelect(bi)} style={{
              flex:1, padding:'4px 8px', borderRadius:3, cursor:'pointer',
              background: currentIdx === bi ? T.green : 'transparent',
              color: currentIdx === bi ? '#fff' : T.cream,
              fontSize:13, fontFamily:"'DM Mono',monospace",
              display:'flex', alignItems:'center', gap:4,
              transition:'background 0.15s',
            }}>
              <span>{b.san}</span>
              {b.class && <ClassBadge cls={b.class}/>}
            </div>
          )}
        </div>
      ))}
    </div>
  );
};

// ─── ANALYSIS SCREEN ─────────────────────────────────────────────────────────
const AnalysisScreen = ({ game, boardSize, pieceStyle = 'flat', onBack }) => {
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);

  const currentMove = game.moves[currentIdx];
  const fen = currentMove ? currentMove.fen : STARTING_FEN;
  const evalVal = currentMove ? currentMove.eval : 0;

  const goFirst = () => setCurrentIdx(0);
  const goPrev = () => setCurrentIdx(i => Math.max(0, i-1));
  const goNext = () => setCurrentIdx(i => Math.min(game.moves.length-1, i+1));
  const goLast = () => setCurrentIdx(game.moves.length-1);

  React.useEffect(() => {
    const handler = e => {
      if (e.key === 'ArrowLeft') goPrev();
      if (e.key === 'ArrowRight') goNext();
      if (e.key === 'Home') goFirst();
      if (e.key === 'End') goLast();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const progress = game.moves.length > 1 ? (currentIdx / (game.moves.length - 1)) * 100 : 0;

  return (
    <div className="analysis-layout" style={{ display:'flex', height:'100%', gap:0, overflowX:'hidden' }}>
      {/* Left: Board area */}
      <div className="analysis-board-area" style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, gap:16, flex:'0 0 auto' }}>
        {/* Player info - Black */}
        <PlayerBadge name={game.black} rating={2832} color="b" accuracy={game.accuracy.black} mistakes={game.mistakes.black} blunders={game.blunders.black}/>
        {/* Board + eval bar */}
        <div style={{ display:'flex', gap:10, alignItems:'center' }}>
          <EvalBar eval={evalVal} height={boardSize}/>
          <ChessBoard fen={fen} flipped={flipped} size={boardSize} pieceStyle={pieceStyle}
            lastMove={currentIdx > 0 ? {from:'e2',to:'e4'} : null}/>
        </div>
        {/* Player info - White */}
        <PlayerBadge name={game.white} rating={2876} color="w" accuracy={game.accuracy.white} mistakes={game.mistakes.white} blunders={game.blunders.white}/>
        {/* Controls */}
        <div style={{ display:'flex', gap:6, alignItems:'center' }}>
          <NavBtn onClick={goFirst}><Icon d={Icons.first} size={14} stroke={T.cream}/></NavBtn>
          <NavBtn onClick={goPrev}><Icon d={Icons.prev} size={14} stroke={T.cream}/></NavBtn>
          <NavBtn onClick={goNext}><Icon d={Icons.next} size={14} stroke={T.cream}/></NavBtn>
          <NavBtn onClick={goLast}><Icon d={Icons.last} size={14} stroke={T.cream}/></NavBtn>
          <div style={{width:1, height:20, background:T.border, margin:'0 4px'}}/>
          <NavBtn onClick={() => setFlipped(f=>!f)} title="Перевернути дошку">
            <Icon d={Icons.flip} size={14} stroke={T.cream}/>
          </NavBtn>
        </div>
        {/* Progress bar */}

const Profile = () => {
  const months = ['Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру','Січ'];
  const ratings = [1720,1745,1760,1752,1780,1795,1782,1810,1800,1825,1835,1840];

  return (
    <div style={{ flex:1, overflowY:'auto', padding:32 }}>

        <div style={{
          width:72, height:72, borderRadius:16, background:`linear-gradient(135deg, ${T.green}, ${T.bg3})`,
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:32,
          border:`2px solid ${T.greenMid}`,
        }}>♞</div>
        <div>
          <h2 style={{ fontSize:22, fontWeight:600, color:T.cream, marginBottom:4 }}>Олексій Коваль</h2>
          <div style={{ fontSize:13, color:T.muted }}>@alexchess · Lichess · Chess.com</div>
          <div style={{ display:'flex', gap:8, marginTop:8 }}>
            {['Lichess', 'Chess.com'].map(p => (
              <span key={p} style={{ padding:'3px 10px', background:T.bg3, border:`1px solid ${T.border}`, borderRadius:20, fontSize:11, color:T.greenPl }}>{p}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Rating chart */}
      <div style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:10, padding:20, marginBottom:20 }}>
        <div style={{ fontSize:14, fontWeight:600, color:T.cream, marginBottom:16 }}>Динаміка рейтингу</div>
        <svg width="100%" height={120} viewBox={`0 0 ${months.length*60} 120`} preserveAspectRatio="none" style={{ display:'block' }}>
          {(() => {
            const W = months.length * 60, H = 120;
            const minR = Math.min(...ratings) - 30, maxR = Math.max(...ratings) + 20;
            const pts = ratings.map((r, i) => `${i/(ratings.length-1)*W},${H - ((r-minR)/(maxR-minR))*H*0.85 - 10}`);
            const area = `M${pts[0]} ` + pts.slice(1).map(p=>`L${p}`).join(' ') + ` L${W},${H} L0,${H} Z`;
            return <>
              <defs>
                <linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={T.green} stopOpacity=".5"/>
                  <stop offset="100%" stopColor={T.green} stopOpacity="0"/>
                </linearGradient>
              </defs>
              <path d={area} fill="url(#rg)"/>
              <polyline points={pts.join(' ')} fill="none" stroke={T.greenLt} strokeWidth={2}/>
              {ratings.map((r,i) => (
                <text key={i} x={i/(ratings.length-1)*W} y={H} textAnchor="middle" fontSize={9} fill={T.faded}>{months[i]}</text>
              ))}
              <text x={W} y={(() => { const r = ratings[ratings.length-1]; const minR2=Math.min(...ratings)-30, maxR2=Math.max(...ratings)+20; return H - ((r-minR2)/(maxR2-minR2))*H*0.85 - 10 - 6; })()} textAnchor="end" fontSize={11} fill={T.greenPl} fontFamily="'DM Mono', monospace">1840</text>
            </>;
          })()}
        </svg>
      </div>

      {/* Opening stats */}
      <div style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:10, padding:20 }}>
        <div style={{ fontSize:14, fontWeight:600, color:T.cream, marginBottom:14 }}>Популярні дебюти</div>
        {[
          { name:'Іспанська партія', pct:35, win:62 },
          { name:"Сицилійський захист", pct:28, win:58 },
          { name:"Французький захист", pct:18, win:71 },
          { name:"Захист Каро-Канн", pct:12, win:55 },
        ].map(o => (
          <div key={o.name} style={{ marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
              <span style={{ fontSize:12, color:T.cream }}>{o.name}</span>
              <span style={{ fontSize:11, color:T.greenPl, fontFamily:"'DM Mono',monospace" }}>Перем. {o.win}%</span>
            </div>
            <div style={{ height:6, background:T.bg3, borderRadius:3 }}>
              <div style={{ width:`${o.pct}%`, height:'100%', background:`linear-gradient(90deg,${T.green},${T.greenMid})`, borderRadius:3 }}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

        <TweakRadio label="Фігури" options={['flat','classic','minimal']} value={tweaks.pieceStyle} onChange={v=>setTweak('pieceStyle',v)}/>
        <TweakToggle label="Eval bar" value={tweaks.showEvalBar} onChange={v=>setTweak('showEvalBar',v)}/>
        <TweakToggle label="Коментарі" value={tweaks.showComments} onChange={v=>setTweak('showComments',v)}/>
        <TweakRadio label="Тема" options={['forest','dark','olive']} value={tweaks.theme} onChange={v=>setTweak('theme',v)}/>
      </TweaksPanel>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
